name: build
on: [push]

jobs:
  build-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build EXE with Docker
        run: |
          docker run --rm -v ${{ github.workspace }}:/build docker.io/retroelec42/sdl2-cross sh -c "
            make -f windows/Makefile && \
            cp /usr/lib/gcc/x86_64-w64-mingw32/12-posix/libstdc++-6.dll /build/windows/ && \
            cp /usr/lib/gcc/x86_64-w64-mingw32/12-posix/libgcc_s_seh-1.dll /build/windows/ && \
            cp /usr/x86_64-w64-mingw32/lib/libwinpthread-1.dll /build/windows/ && \
            cp /opt/sdl2-windows/SDL2/x86_64-w64-mingw32/bin/SDL2.dll /build/windows/
          "

      - name: Upload Executable and DLLs
        uses: actions/upload-artifact@v4
        with:
          name: windows-executable
          path: |
            windows/c64win.exe
            windows/*.dll

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: windows/c64win.exe

  build-esp32:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - board: T_HMI
            chip: "esp32s3"
            keyboard: BLE_KEYBOARD
            fqbn: "esp32:esp32:esp32s3:CDCOnBoot=cdc,DFUOnBoot=dfu,FlashSize=16M,JTAGAdapter=builtin,PartitionScheme=huge_app,PSRAM=opi,DebugLevel=info"
            extra_flags: "-DBOARD_HAS_PSRAM"
          - board: T_HMI
            chip: "esp32s3"
            keyboard: WEB_KEYBOARD
            fqbn: "esp32:esp32:esp32s3:CDCOnBoot=cdc,DFUOnBoot=dfu,FlashSize=16M,JTAGAdapter=builtin,PartitionScheme=huge_app,PSRAM=opi,DebugLevel=info"
            extra_flags: "-DBOARD_HAS_PSRAM"
          - board: T_DISPLAY_S3
            chip: "esp32s3"
            keyboard: BLE_KEYBOARD
            fqbn: "esp32:esp32:esp32s3:CDCOnBoot=cdc,DFUOnBoot=dfu,FlashSize=16M,JTAGAdapter=builtin,PartitionScheme=huge_app,PSRAM=opi,DebugLevel=info"
            extra_flags: "-DBOARD_HAS_PSRAM"
          - board: T_DISPLAY_S3
            chip: "esp32s3"
            keyboard: WEB_KEYBOARD
            fqbn: "esp32:esp32:esp32s3:CDCOnBoot=cdc,DFUOnBoot=dfu,FlashSize=16M,JTAGAdapter=builtin,PartitionScheme=huge_app,PSRAM=opi,DebugLevel=info"
            extra_flags: "-DBOARD_HAS_PSRAM"
          - board: WAVESHARE
            chip: "esp32s3"
            keyboard: BLE_KEYBOARD
            fqbn: "esp32:esp32:esp32s3:CDCOnBoot=cdc,DFUOnBoot=dfu,FlashSize=16M,JTAGAdapter=builtin,PartitionScheme=app3M_fat9M_16MB,PSRAM=opi,DebugLevel=info"
            extra_flags: "-DBOARD_HAS_PSRAM"
          - board: WAVESHARE
            chip: "esp32s3"
            keyboard: WEB_KEYBOARD
            fqbn: "esp32:esp32:esp32s3:CDCOnBoot=cdc,DFUOnBoot=dfu,FlashSize=16M,JTAGAdapter=builtin,PartitionScheme=app3M_fat9M_16MB,PSRAM=opi,DebugLevel=info"
            extra_flags: "-DBOARD_HAS_PSRAM"
          - board: CYD
            chip: "esp32"
            keyboard: NO_KEYBOARD
            fqbn: "esp32:esp32:esp32:FlashMode=qio,FlashSize=4M,PartitionScheme=huge_app,LoopCore=0,DebugLevel=info"
            extra_flags: ""
          - board: LEDMATRIX
            chip: "esp32s3"
            keyboard: BLE_KEYBOARD
            fqbn: "esp32:esp32:esp32s3:CDCOnBoot=cdc,FlashSize=8M,PSRAM=enabled,PartitionScheme=default_8MB"
            extra_flags: "-DBOARD_HAS_PSRAM"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Firmware
        run: |
          EXPORT_PATH="${{ github.workspace }}/export"
          mkdir -p "$EXPORT_PATH"
          docker run --rm -v ${{ github.workspace }}:/workspace/T-HMI-C64 -v "$EXPORT_PATH":/output \
            docker.io/retroelec42/arduino-cli-thmic64 compile \
            --fqbn "${{ matrix.fqbn }}" \
            --export-binaries --output-dir /output \
            --build-property "build.extra_flags=-DBOARD_${{ matrix.board }} -DUSE_${{ matrix.keyboard }} -DESP32 ${{ matrix.extra_flags }}" \
            T-HMI-C64.ino
          sudo chown -R $USER:$USER "$EXPORT_PATH"

      - name: Prepare and Rename
        run: |
          EXPORT_PATH="${{ github.workspace }}/export"
          ls -lh "$EXPORT_PATH"
          find "$EXPORT_PATH" -name "*.merged.bin" -exec mv {} "$EXPORT_PATH/T-HMI-C64.merged.bin" \; 2>/dev/null || true
          find "$EXPORT_PATH" -name "*.factory.bin" -exec mv {} "$EXPORT_PATH/T-HMI-C64.merged.bin" \; 2>/dev/null || true
          sed -e "s|__BOARD__|${{ matrix.board }}|g" -e "s|__CHIP__|${{ matrix.chip }}|g" scripts/flash.sh > "$EXPORT_PATH/flash.sh"
          sed -e "s|__BOARD__|${{ matrix.board }}|g" -e "s|__CHIP__|${{ matrix.chip }}|g" scripts/flash.bat > "$EXPORT_PATH/flash.bat"
          chmod +x "$EXPORT_PATH/flash.sh"

      - name: Upload ESP32 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: t-hmi-c64-${{ matrix.board }}-${{ matrix.keyboard }}
          path: |
            ${{ github.workspace }}/export/T-HMI-C64.merged.bin
            ${{ github.workspace }}/export/flash.sh
            ${{ github.workspace }}/export/flash.bat

